{% extends "base.html" %}
{% block title %}Capture POD Event | FSI{% endblock %}

{% block content %}
<section class="fsi-card pod-event-card">
    <h1 class="fsi-display">Record POD Event</h1>

    <form id="podEventForm" class="pod-event-form" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" id="csrf_token" value="{{ csrf_token() }}"/>
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">

        <div class="fsi-form-grid pod-event-fieldset">
            <label>Scan HWB Barcode</label>
            <div id="qr-reader" class="pod-qr-reader"></div>
            <input type="text" id="hwb_number" name="hwb_number" class="fsi-input" placeholder="HWB Number" required>
            <button type="button" id="lookup-hwb" class="fsi-secondary-btn">Lookup HWB</button>
            <small id="scan-mode">Awaiting scan...</small>
        </div>

        <div id="load-board-summary" class="fsi-form-grid pod-event-fieldset" style="display: none;">
            <label>Load Board Summary (Read Only)</label>
            <p><strong>Shipper:</strong> <span id="summary-shipper">-</span></p>
            <p><strong>Consignee:</strong> <span id="summary-consignee">-</span></p>
            <p><strong>Contact:</strong> <span id="summary-contact">-</span></p>
            <p><strong>Phone:</strong> <span id="summary-phone">-</span></p>
            <div id="mawb-hwb-list-container" style="display: none; margin-top: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #3f76c7; background: rgba(63, 118, 199, 0.15);">
                <strong>Matched MAWB - Included HWBs</strong>
                <ul id="mawb-hwb-list"></ul>
            </div>
        </div>

        <div id="manual-pod-fields" class="fsi-form-grid pod-event-fieldset" style="display: none;">
            <label>Manual POD Details (Optional)</label>
            <input type="text" id="shipper" name="shipper" class="fsi-input" placeholder="Shipper">
            <input type="text" id="consignee" name="consignee" class="fsi-input" placeholder="Consignee">
            <input type="text" id="contact_name" name="contact_name" class="fsi-input" placeholder="Contact Name">
            <input type="text" id="phone" name="phone" class="fsi-input" placeholder="Phone">
        </div>

        <div id="off-sheet-warning" class="fsi-form-grid pod-event-fieldset" style="display: none; border: 1px solid #d32f2f;">
            <label>Off-Sheet Confirmation Required</label>
            <p id="off-sheet-warning-text" style="color: #d32f2f; margin: 0;"></p>
            <label style="display: flex; gap: 8px; align-items: center;">
                <input type="checkbox" id="off-sheet-confirm-checkbox">
                I confirm I understand this off-sheet reassignment warning.
            </label>
            <label for="reassignment_note">Reassignment Note (Optional)</label>
            <textarea id="reassignment_note" name="reassignment_note" class="fsi-input" rows="3" placeholder="Add context for this reassignment."></textarea>
        </div>

        <div class="fsi-form-grid pod-event-fieldset">
            <label>Action Type</label>
            <select name="action_type" id="action_type" class="fsi-input" required>
                <option value="shipper pickup">Shipper Pickup (Leg 1 Start)</option>
                <option value="origin airport drop">Origin Airport Drop (Leg 1 Complete)</option>
                <option value="destination airport pickup">Destination Airport Pickup (Leg 3 Start)</option>
                <option value="consignee drop">Consignee Drop (Final Delivery)</option>
            </select>
        </div>

        <div class="fsi-form-grid pod-event-fieldset">
            <label id="label_recipient_name"> Name <span style="color:red">*</span></label>
            <input type="text" id="recipient_name" name="recipient_name" class="fsi-input">
        </div>

        <div class="fsi-form-grid pod-event-fieldset">
            <label id="label_pod_photo">Capture Photo <span style="color:red">*</span></label>
            <input type="file" id="pod_photo" name="pod_photo" accept="image/*" capture="environment" class="fsi-input">
        </div>

        <div class="fsi-form-grid pod-event-fieldset">
            <label id="label_signature"> Signature <span style="color:red">*</span></label>
            <div class="pod-signature-shell">
                <canvas id="signature-pad" class="pod-signature-canvas" width="400" height="200" style="touch-action: none;"></canvas>
            </div>
            <div class="fsi-form-actions">
                <button type="button" class="fsi-secondary-btn pod-clear-signature" id="clear-signature">Clear Signature</button>
            </div>
        </div>

        <div class="fsi-form-actions">
            <button class="fsi-primary-btn" id="submitBtn" type="submit">Submit POD Event</button>
        </div>
        <div id="statusMessage" class="pod-status-message fsi-status-line" aria-live="polite"></div>
    </form>
</section>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    function captureLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('latitude').value = position.coords.latitude;
                    document.getElementById('longitude').value = position.coords.longitude;
                    resolve();
                },
                (error) => {
                    console.warn("GPS capture failed: ", error.message);
                    resolve();
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });
    }

    const summaryShell = document.getElementById('load-board-summary');
    const manualPodFieldsShell = document.getElementById('manual-pod-fields');
    const modeText = document.getElementById('scan-mode');
    const actionTypeSelect = document.getElementById('action_type');
    const recipientNameInput = document.getElementById('recipient_name');
    const podPhotoInput = document.getElementById('pod_photo');
    const offSheetWarningShell = document.getElementById('off-sheet-warning');
    const offSheetWarningText = document.getElementById('off-sheet-warning-text');
    const offSheetConfirmCheckbox = document.getElementById('off-sheet-confirm-checkbox');
    const reassignmentNoteInput = document.getElementById('reassignment_note');
    const mawbListContainer = document.getElementById('mawb-hwb-list-container');
    const mawbList = document.getElementById('mawb-hwb-list');
    let warningRequired = false;

    function updateFormRequirements() {
        const action = actionTypeSelect.value;
        if (action === 'consignee drop') {
            recipientNameInput.required = true;
            podPhotoInput.required = true;
            document.getElementById('label_recipient_name').innerHTML = 'Recipient Name <span style="color:red">*</span>';
            document.getElementById('label_pod_photo').innerHTML = 'Capture POD Photo <span style="color:red">*</span>';
            document.getElementById('label_signature').innerHTML = 'Consignee Signature <span style="color:red">*</span>';
        } else if (action === 'origin airport drop') {
            recipientNameInput.required = true;
            podPhotoInput.required = false;
            document.getElementById('label_recipient_name').innerHTML = 'Recipient Name <span style="color:red">*</span>';
            document.getElementById('label_pod_photo').innerHTML = 'Capture POD Photo (Optional)';
            document.getElementById('label_signature').innerHTML = 'Consignee Signature (Optional)';
        } else {
            recipientNameInput.required = false;
            podPhotoInput.required = false;
            document.getElementById('label_recipient_name').innerHTML = 'Recipient Name (Optional)';
            document.getElementById('label_pod_photo').innerHTML = 'Capture POD Photo (Optional)';
            document.getElementById('label_signature').innerHTML = 'Consignee Signature (Optional)';
        }
    }

    function resetManualPodFields() {
        document.getElementById('shipper').value = '';
        document.getElementById('consignee').value = '';
        document.getElementById('contact_name').value = '';
        document.getElementById('phone').value = '';
    }

    function resetWarningState() {
        warningRequired = false;
        offSheetConfirmCheckbox.checked = false;
        reassignmentNoteInput.value = '';
        offSheetWarningText.textContent = '';
        offSheetWarningShell.style.display = 'none';
    }

    function renderMawbMatch(payload) {
        const hwbs = Array.isArray(payload.hwbs) ? payload.hwbs.filter(Boolean) : [];
        if (payload.matched_by !== 'mawb' || hwbs.length === 0) {
            mawbListContainer.style.display = 'none';
            mawbList.innerHTML = '';
            return;
        }

        mawbList.innerHTML = '';
        for (const hwb of hwbs) {
            const listItem = document.createElement('li');
            listItem.textContent = hwb;
            mawbList.appendChild(listItem);
        }
        mawbListContainer.style.display = 'block';
    }

    async function lookupHwb() {
        const hwbNumber = document.getElementById('hwb_number').value.trim();
        if (!hwbNumber) {
            modeText.textContent = 'Scan or enter an HWB number first.';
            return;
        }

        const response = await fetch('{{ url_for("paperwork.scan_hwb") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'X-CSRFToken': document.getElementById('csrf_token').value
            },
            body: JSON.stringify({ hwb_number: hwbNumber })
        });
        const payload = await response.json();
        if (!response.ok) {
            modeText.textContent = payload.error || 'Lookup failed.';
            modeText.style.color = 'red';
            return;
        }

        if (payload.mode === 'enhanced') {
            document.getElementById('summary-shipper').textContent = payload.shipper;
            document.getElementById('summary-consignee').textContent = payload.consignee;
            document.getElementById('summary-contact').textContent = payload.contact_name;
            document.getElementById('summary-phone').textContent = payload.phone;
            summaryShell.style.display = 'block';
            manualPodFieldsShell.style.display = 'none';
            resetManualPodFields();
            renderMawbMatch(payload);
            if (payload.matched_by === 'mawb') {
                modeText.textContent = `Enhanced mode: MAWB matched (${payload.shipment_count} shipment${payload.shipment_count === 1 ? '' : 's'}).`;
                modeText.style.color = '#3f76c7';
            } else {
                modeText.textContent = 'Enhanced mode: Load Board record found.';
                modeText.style.color = 'green';
            }

            warningRequired = Boolean(payload.warning_required);
            if (warningRequired) {
                offSheetWarningText.textContent = payload.warning_message || 'Off-sheet confirmation is required.';
                offSheetWarningShell.style.display = 'block';
                offSheetConfirmCheckbox.checked = false;
            } else {
                resetWarningState();
            }
        } else {
            summaryShell.style.display = 'none';
            manualPodFieldsShell.style.display = 'block';
            mawbListContainer.style.display = 'none';
            mawbList.innerHTML = '';
            modeText.textContent = 'Base mode: No load board match, manual POD will be recorded.';
            modeText.style.color = '';
            resetWarningState();
        }
    }

    function getQrConfig() {
        const viewportWidth = window.innerWidth || 1024;
        const responsiveBox = Math.max(160, Math.min(220, Math.floor(viewportWidth * 0.42)));
        return { fps: 10, qrbox: { width: responsiveBox, height: responsiveBox } };
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", getQrConfig(), false);
    html5QrcodeScanner.render(async (decodedText) => {
        document.getElementById('hwb_number').value = decodedText;
        html5QrcodeScanner.clear();
        await captureLocation();
        await lookupHwb();
    }, () => {});

    document.getElementById('lookup-hwb').addEventListener('click', lookupHwb);

    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });

    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    document.getElementById('clear-signature').addEventListener('click', () => signaturePad.clear());
    actionTypeSelect.addEventListener('change', updateFormRequirements);
    updateFormRequirements();

    document.getElementById('podEventForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const action = document.getElementById('action_type').value;
        if (action === 'consignee drop' && signaturePad.isEmpty()) {
            alert("Please provide a signature for delivery.");
            return;
        }

        if (warningRequired && !offSheetConfirmCheckbox.checked) {
            alert(offSheetWarningText.textContent || 'You must confirm the off-sheet warning to continue.');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('statusMessage');
        submitBtn.disabled = true;
        statusDiv.innerText = "Submitting event data...";

        if (!document.getElementById('latitude').value) await captureLocation();

        const formData = new FormData(this);
        if (!signaturePad.isEmpty()) {
            formData.append('signature_base64', signaturePad.toDataURL("image/png"));
        }
        formData.append('off_sheet_confirmed', warningRequired ? String(offSheetConfirmCheckbox.checked) : 'false');
        formData.append('reassignment_note', reassignmentNoteInput.value.trim());

        try {
            const response = await fetch('{{ url_for("paperwork.log_pod_event") }}', {
                method: 'POST',
                headers: { 'Accept': 'application/json' },
                body: formData
            });

            if (response.ok) {
                statusDiv.innerText = "POD Event successfully recorded.";
                statusDiv.style.color = "green";
                setTimeout(() => window.location.reload(), 1500);
            } else {
                const err = await response.json();
                statusDiv.innerText = "Error: " + err.error;
                statusDiv.style.color = "red";
                submitBtn.disabled = false;
            }
        } catch (error) {
            statusDiv.innerText = "Network error occurred.";
            statusDiv.style.color = "red";
            submitBtn.disabled = false;
        }
    });
});
</script>
{% endblock %}
